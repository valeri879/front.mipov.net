<div class="container py-3">
    <div class="card mx-auto" style="max-width: 420px;">
        <div class="card-body">
            <h1 class="card-title">🔐 Password reset</h1>

            <ng-container *ngIf="!hasToken; else resetPasswordTemplate">
                <p>Enter your account email and we will send you password reset instructions.</p>
                <form [formGroup]="requestResetFormGroup">
                    <div class="form-group mb-3">
                        <label for="email"><b>Email</b></label>
                        <input [class.is-invalid]="error" type="email" id="email" class="form-control" formControlName="email" placeholder="your@email.com">
                    </div>
                    <button type="button" (click)="requestPasswordReset()" [disabled]="loading || requestResetFormGroup.invalid" class="btn btn-primary w-100">
                        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
                        Send reset instructions
                    </button>
                </form>
            </ng-container>

            <ng-template #resetPasswordTemplate>
                <p>Set a new password for your account.</p>
                <form [formGroup]="resetPasswordFormGroup">
                    <div class="form-group mb-2">
                        <label for="password"><b>New password</b></label>
                        <input [class.is-invalid]="error || isPasswordsMismatch" type="password" id="password" class="form-control" formControlName="password">
                    </div>
                    <div class="form-group mb-3">
                        <label for="repeat-password"><b>Repeat new password</b></label>
                        <input [class.is-invalid]="error || isPasswordsMismatch" type="password" id="repeat-password" class="form-control" formControlName="repeatPassword">
                        <small *ngIf="isPasswordsMismatch" class="text-danger">Passwords must match.</small>
                    </div>
                    <button type="button" (click)="resetPassword()" [disabled]="loading || resetPasswordFormGroup.invalid || isPasswordsMismatch || resetCompleted" class="btn btn-success w-100">
                        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
                        Reset password
                    </button>
                </form>
            </ng-template>

            <div *ngIf="success" class="alert alert-success mt-3 mb-0">{{ success }}</div>
            <div *ngIf="error" class="alert alert-danger mt-3 mb-0">{{ error }}</div>

            <a routerLink="/login" class="btn btn-link w-100 mt-2">Back to login</a>
        </div>
    </div>
</div>
