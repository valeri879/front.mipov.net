<div class="container py-3">
    <div class="card mx-auto" style="max-width: 420px;">
        <div class="card-body">
            <h1 class="card-title">🔒 Set new password</h1>
            <p>Enter your new password to complete account recovery.</p>

            <form [formGroup]="resetPasswordFormGroup">
                <div class="form-group mb-2">
                    <label for="password"><b>New password</b></label>
                    <input [class.is-invalid]="error || isPasswordsMismatch" type="password" id="password" class="form-control" formControlName="password">
                </div>
                <div class="form-group mb-3">
                    <label for="repeat-password"><b>Repeat new password</b></label>
                    <input [class.is-invalid]="error || isPasswordsMismatch" type="password" id="repeat-password" class="form-control" formControlName="repeatPassword">
                    <small *ngIf="isPasswordsMismatch" class="text-danger">Passwords must match.</small>
                </div>
                <button type="button" (click)="setNewPassword()" [disabled]="loading || resetPasswordFormGroup.invalid || isPasswordsMismatch || !token || resetCompleted" class="btn btn-success w-100">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
                    Save new password
                </button>
            </form>

            <div *ngIf="success" class="alert alert-success mt-3 mb-0">{{ success }}</div>
            <div *ngIf="error" class="alert alert-danger mt-3 mb-0">{{ error }}</div>

            <a routerLink="/login" class="btn btn-link w-100 mt-2">Back to login</a>
        </div>
    </div>
</div>
